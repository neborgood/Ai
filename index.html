<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebLLM Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root {
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #007acc;
            --user-msg: #2b2b2b;
            --ai-msg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        #status {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #333;
        }

        #input-container {
            display: flex;
            padding: 15px;
            background-color: var(--chat-bg);
            border-top: 1px solid #333;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 20px;
            color: #fff;
            padding: 10px 15px;
            resize: none;
            height: 24px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        Local Private AI
        <div id="status">Loading engine...</div>
    </header>

    <div id="chat-container">
        <div class="message ai">Hi! I am your completely private, on-device AI. Once my model finishes loading, we can chat without any internet connection.</div>
    </div>

    <div id="input-container">
        <textarea id="user-input" placeholder="Type a message..." disabled></textarea>
        <button id="send-btn" disabled>➔</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const statusDiv = document.getElementById("status");
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        // We use Qwen 2.5 0.5B because it's incredibly tiny (~350MB) and fast on mobile GPUs
        const selectedModel = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
        let engine;

        async function initEngine() {
            try {
                statusDiv.innerText = "Initializing WebGPU...";
                engine = new webllm.MLCEngine();
                
                engine.setInitProgressCallback((report) => {
                    statusDiv.innerText = report.text;
                });

                await engine.reload(selectedModel);
                statusDiv.innerText = "Model loaded & Ready! (Offline Mode)";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "Error loading WebGPU. Ensure your browser supports it.";
                console.error(err);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Append user message
            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Setup AI placeholder
            const aiMessageElement = appendMessage("Thinking...", "ai");

            try {
                const messages = [{ role: "user", content: text }];
                const reply = await engine.chat.completions.create({
                    messages,
                    stream: true // Streams the response in real-time
                });

                let responseText = "";
                for await (const chunk of reply) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    responseText += delta;
                    aiMessageElement.innerText = responseText;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (error) {
                aiMessageElement.innerText = "Error generating response.";
                console.error(error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(text, sender) {
            const msg = document.createElement("div");
            msg.classList.add("message", sender);
            msg.innerText = text;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Register Service Worker for PWA installation
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("SW Registration Failed", err));
        }

        initEngine();
    </script>
</body>
</html>
